<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VALIDATION PAGE</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 2rem;
      max-width: 600px;
    }

    h1 {
      margin-bottom: 1rem;
    }

    textarea {
      width: 100%;
      height: 4.5em; /* approx. 3 lines */
      resize: none;
      font-family: monospace;
      font-size: 1rem;
      padding: 0.5rem;
    }

    button {
      margin-top: 0.5rem;
      padding: 0.4rem 1rem;
      font-size: 1rem;
    }

    #message {
      margin-top: 1rem;
      font-weight: bold;
    }

    .ok {
      color: green;
    }

    .fail {
      color: red;
    }
  </style>
</head>
<body>
  <h1>VALIDATION PAGE</h1>

  <textarea id="userInput" placeholder="Enter your code..."></textarea>
  <br />
  <button id="validationButton" class="validationButton">Validate</button>

  <div id="message"></div>

  <script src="validation.js"></script>
</body>
</html>
